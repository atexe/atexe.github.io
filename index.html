<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRICK BREAKER - Play Online</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="wrapper">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-display">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="level-display">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div id="lives-display">
        <div class="life-dot"></div>
        <div class="life-dot"></div>
        <div class="life-dot"></div>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div id="overlay-title">BRICK<br>BREAKER</div>
      <div id="overlay-sub">Drag to move paddle<br>Tap to launch ball</div>
      <button id="start-btn">PLAY</button>
    </div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
